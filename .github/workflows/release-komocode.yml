name: Release KomoCode CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: packages/cli
        run: bun install --os="*" --cpu="*"

      - name: Build all platforms
        working-directory: packages/cli
        run: bun run script/build.ts

      - name: Collect binaries
        run: |
          mkdir -p release
          cp packages/cli/dist/cli-linux-x64/bin/komocode        release/komocode-linux-x64
          cp packages/cli/dist/cli-linux-arm64/bin/komocode       release/komocode-linux-arm64
          cp packages/cli/dist/cli-darwin-x64/bin/komocode        release/komocode-darwin-x64
          cp packages/cli/dist/cli-darwin-arm64/bin/komocode      release/komocode-darwin-arm64
          cp packages/cli/dist/cli-windows-x64/bin/komocode.exe   release/komocode-windows-x64.exe
          chmod +x release/komocode-linux-* release/komocode-darwin-*

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload to Cloudflare R2
        run: |
          aws configure set aws_access_key_id "${{ secrets.R2_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          aws configure set default.region auto
          TAG=${GITHUB_REF#refs/tags/}
          aws s3 cp release/ s3://komocode-releases/${TAG}/ \
            --recursive \
            --endpoint-url https://ebf3d47cf85da68710f5f78a51828090.r2.cloudflarestorage.com \
            --no-progress
          aws s3 cp release/ s3://komocode-releases/latest/ \
            --recursive \
            --endpoint-url https://ebf3d47cf85da68710f5f78a51828090.r2.cloudflarestorage.com \
            --no-progress

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
